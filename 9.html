//Change button text onclick using querySelector
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="myButton" onclick="changeButtonText()">Good Morning</button>
    <script>
        function changeButtonText() {
            const button = document.querySelector("#myButton");
            button.textContent = "Good Evening";
        }
        </script>
</body>
</html>
