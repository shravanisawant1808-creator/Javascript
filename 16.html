//Write a function multiply() that multiplies two numbers and display the result
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Multiply Two Numbers</h1>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="multiply()">Multiply</button>
    <p id="result"></p>
    <script>
        function multiply() {
            const number1 = parseFloat(document.getElementById("num1").value);
            const number2 = parseFloat(document.getElementById("num2").value);
            const product = number1 * number2;
            document.getElementById("result").textContent = "Result: " + product;
        }
    </script>
</body>
</html>
