//hide a paragraph using queryselector
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <p class="info">This is a paragraph that will be hidden when the button is clicked.</p>
   <button onclick="hideParagraph()">Hide Paragraph</button>
    <script>
        function hideParagraph() {
            const paragraph = document.querySelector(".info");
            paragraph.style.display = "none";
        }
    </script> 
</body>
</html>
