//Read text from a textboxusing queyselector()
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="myInput" placeholder="Enter some text">
    <button onclick="readText()">Read Text</button>
    <p class="output"></p>

    <script>
        function readText() {
            const input = document.querySelector("#myInput");
            const output = document.querySelector(".output");
            output.textContent = "You entered: " + input.value;
        }
    </script>
</body>
</html>
