// Use prompt() to take marks and display thr result using alert() function
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const marks = prompt("Enter your marks:");
        if (marks >= 90) {
            alert("Grade: A");
        } else if (marks >= 80) {
            alert("Grade: B");
        } else if (marks >= 70) {
            alert("Grade: C");
        } else if (marks >= 60) {
            alert("Grade: D");
        } else {
            alert("Grade: F");
        }
    </script>
</body>
</html>
